const CAMERA_ANGLES = [
  { id: 'eye-level', label: '정면 아이레벨 (Eye Level)', desc: '인간의 시선과 동일한 높이로 정직하고 균형감 있는 안정적 구도' },
  { id: 'low-angle', label: '하이파워 로우 앵글 (Low Angle)', desc: '아래에서 위로 올려다보는 강렬하고 웅장한 히어로 구도' },
  { id: 'high-angle', label: '감각적 하이 앵글 (High Angle)', desc: '위에서 굽어보는 부드럽고 전경적인 스튜디오 패션 구도' },
  { id: 'macro-close', label: '익스트림 제품 근접샷 (Extreme Close-Up)', desc: '상품의 미세한 마감과 핏의 질감을 정밀하게 보여주는 컷' }

const POSES = [
  { id: 'dynamic-walking', label: '역동적인 워킹 (Dynamic Walking)', desc: '도시 속 혹은 런웨이를 거니는 스포티한 움직임' },
  { id: 'confident-stand', label: '자신감 넘치는 정면 응시 (Confident Stand)', desc: '정면을 바라보며 시선을 사로잡는 클래식 상업화보 포즈' },
  { id: 'cozy-relaxed', label: '자연스럽고 편안한 포즈 (Relaxed Sitting/Leaning)', desc: '난간이나 카페 의자에 기대어 편안한 일상과 제품의 어울림 표현' },
  { id: 'high-fashion', label: '하이패션 에디토리얼 (Editorial Avant-Garde)', desc: '예술적이고 감각적인 앵글과 바디 실루엣을 강조한 예술 화보' }

  { id: 'bust-shot', label: '바스트 샷 (Bust Shot)', desc: '가슴 부분까지 크롭하여 모델 표정과 상반신 장식품 조화' },
  { id: 'waist-up', label: '웨이스트 샷 (Waist-Up)', desc: '허리 윗부분을 조명하여 의류, 시계, 가방 피팅감 최적화' },
  { id: 'full-body', label: '전신 샷 (Full Body)', desc: '머리끝부터 발끝까지 전체 스타일링과 배경 조화를 전부 담아냄' }
];

const BACKGROUNDS = [
  { id: 'luxury-lounge', label: '5성급 호텔 라운지 (Luxury Hotel Lounge)', desc: '화려한 대리석, 은은한 간접 조명과 통유리 너머 도심 야경이 펼쳐지는 곳' },
  { id: 'cyberpunk-neon', label: '네온 사이버펑크 야간 거리 (Cyberpunk Neon Street)', desc: '비 내린 도로 위 반사되는 네온사인과 홀로그램이 가득한 미래형 거리' },
  { id: 'cozy-scandinavian', label: '스칸디나비아풍 카페 (Cozy Scandinavian Cafe)', desc: '따뜻한 우드 톤 가구, 풍성한 식물 오브제와 스며드는 자연 조명' },
  { id: 'minimal-studio', label: '미니멀 모노 스튜디오 (Minimalist White/Grey Studio)', desc: '경계가 모호한 화이트 돔 스크린과 완벽히 통제된 무결점 패션 화보 전용 백그라운드' },
  { id: 'nature-cliff', label: '북유럽 피오르드 절벽 해안 (Nordic Cliffside)', desc: '거친 해안 암벽, 파도와 안개가 자아내는 신비롭고 아웃도어 지향적인 대자연' }
];

const LIGHTINGS = [
  { id: 'golden-hour', label: '찬란한 석양 빛 (Golden Hour Warmth)', desc: '오후 5시의 낮고 길게 드리우는 따뜻한 주황빛 감성 실루엣 조명' },
  { id: 'rim-cinematic', label: '시네마틱 백라이트 & 림 라이트 (Cinematic Rim)', desc: '인물 윤곽선 뒤편에서 정교하게 감싸 흐르는 역광 조명 기법' },
  { id: 'soft-diffused', label: '부드러운 디퓨즈 조명 (Soft Diffused Softbox)', desc: '그림자가 거의 지지 않는 은은하고 화사한 뷰티 광고 라이트' },
  { id: 'high-contrast', label: '고대비 스포트라이트 (High Contrast Spotlight)', desc: '어두운 배경과 강렬한 주 조명을 대비시켜 입체감과 주도적인 무드를 극대화' }
];

function App() {
  const [apiKey, setApiKey] = useState('');
  const [apiReady, setApiReady] = useState(false);
  
  // Model & Product Selections
  const [selectedProduct, setSelectedProduct] = useState(PRESET_PRODUCTS[0]);
  const [selectedModel, setSelectedModel] = useState(PRESET_MODELS[0]);
  
  // Custom uploaded images (stored as base64 or object URLs)
  const [customProductImage, setCustomProductImage] = useState(null);
  const [customModelImage, setCustomModelImage] = useState(null);

  // Layout Composer State
  const [prodPos, setProdPos] = useState({ x: 50, y: 50, scale: 0.6, rotation: 0, opacity: 1 });
  const [isDragging, setIsDragging] = useState(false);
  const [dragStart, setDragStart] = useState({ x: 0, y: 0 });

  // Camera, Pose, Background selections
  const [cameraAngle, setCameraAngle] = useState(CAMERA_ANGLES[0].id);
  const [pose, setPose] = useState(POSES[1].id);
  const [showingRange, setShowingRange] = useState(SHOWING_RANGES[2].id);
  const [background, setBackground] = useState(BACKGROUNDS[3].id);
  const [lighting, setLighting] = useState(LIGHTINGS[2].id);
  const [customPrompt, setCustomPrompt] = useState('');

  // AI Generation States
  const [isGenerating, setIsGenerating] = useState(false);
  const [generationStep, setGenerationStep] = useState('');
  const [generatedImageUrl, setGeneratedImageUrl] = useState(null);
  const [generationHistory, setGenerationHistory] = useState([]);
  
  // UI Tabs & Views
  const [activeTab, setActiveTab] = useState('composer'); // 'composer', 'history', 'docs'
  const [showGuide, setShowGuide] = useState(true);
  
  const composerContainerRef = useRef(null);

  // Update base model or product selections when custom uploaded
  const getProductImageSrc = () => {
    return customProductImage || selectedProduct.url;
  };

  const getModelImageSrc = () => {
    return customModelImage || selectedModel.url;
  };

  // Mouse / Touch handlers for dragging the product image over the model image
  const handleDragStart = (e) => {
    setIsDragging(true);
    const clientX = e.clientX || e.touches[0].clientX;
    const clientY = e.clientY || e.touches[0].clientY;
    setDragStart({
      x: clientX - prodPos.x,
      y: clientY - prodPos.y
    });
  };

  const handleDragMove = (e) => {
    if (!isDragging) return;
    const clientX = e.clientX || (e.touches && e.touches[0].clientX);
    const clientY = e.clientY || (e.touches && e.touches[0].clientY);
    if (!clientX || !clientY) return;

    if (composerContainerRef.current) {
      const rect = composerContainerRef.current.getBoundingClientRect();
      let newX = clientX - dragStart.x;
      let newY = clientY - dragStart.y;
      
      // Restrict positioning within bounding area roughly
      newX = Math.max(-50, Math.min(rect.width + 50, newX));
      newY = Math.max(-50, Math.min(rect.height + 50, newY));

      setProdPos(prev => ({ ...prev, x: newX, y: newY }));
    }
  };

  const handleDragEnd = () => {
    setIsDragging(false);
  };

  const adjustScale = (amount) => {
    setProdPos(prev => ({
      ...prev,
      scale: Math.max(0.1, Math.min(2.0, parseFloat((prev.scale + amount).toFixed(2))))
    }));
  };

  const adjustRotation = (amount) => {
    setProdPos(prev => ({
      ...prev,
      rotation: (prev.rotation + amount) % 360
    }));
  };

  const adjustOpacity = (value) => {
    setProdPos(prev => ({
      ...prev,
      opacity: parseFloat(value)
    }));
  };

  // Helper to trigger custom uploads
  const handleProductUpload = (e) => {
    const file = e.target.files[0];
    if (file) {
      const reader = new FileReader();
      reader.onload = (uploadEvent) => {
        setCustomProductImage(uploadEvent.target.result);
      };
      reader.readAsDataURL(file);
    }
  };

  const handleModelUpload = (e) => {
    const file = e.target.files[0];
    if (file) {
      const reader = new FileReader();
      reader.onload = (uploadEvent) => {
        setCustomModelImage(uploadEvent.target.result);
      };
      reader.readAsDataURL(file);
    }
  };

  // Function to capture the combined element and convert it to a clean base64 image (excluding controls)
  const generateCompositeBase64 = async () => {
    return new Promise((resolve, reject) => {
      const canvas = document.createElement('canvas');
      const ctx = canvas.getContext('2d');
      
      const modelImg = new Image();
      const prodImg = new Image();
      
      modelImg.crossOrigin = "anonymous";
      prodImg.crossOrigin = "anonymous";
      
      modelImg.onload = () => {
        // Use model image natural dimensions for base
        canvas.width = modelImg.naturalWidth || 800;
        canvas.height = modelImg.naturalHeight || 1000;
        
        // 1. Draw Model (Background)
        ctx.drawImage(modelImg, 0, 0, canvas.width, canvas.height);
        
        // 2. Load Product & Draw it with current scale/rotation/pos
        prodImg.onload = () => {
          if (composerContainerRef.current) {
            const rect = composerContainerRef.current.getBoundingClientRect();
            
            // Convert relative UI positions back to canvas coordinates
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            
            const targetX = prodPos.x * scaleX;
            const targetY = prodPos.y * scaleY;
            
            const targetWidth = (rect.width * prodPos.scale) * scaleX;
            const targetHeight = (prodImg.naturalHeight * (targetWidth / prodImg.naturalWidth));
            
            ctx.save();
            ctx.globalAlpha = prodPos.opacity;
            
            // Translate to center of product to rotate
            ctx.translate(targetX, targetY);
            ctx.rotate((prodPos.rotation * Math.PI) / 180);
            
            // Draw centered
            ctx.drawImage(prodImg, -targetWidth / 2, -targetHeight / 2, targetWidth, targetHeight);
            ctx.restore();
          }
          
          // Export final composite base64 without header
          const dataURL = canvas.toDataURL('image/png');
          const base64Data = dataURL.replace(/^data:image\/(png|jpg|jpeg);base64,/, "");
          resolve(base64Data);
        };
        
        prodImg.onerror = () => {
          // If Unsplash block, we fall back to a styled rect on canvas to avoid breaking
          ctx.save();
          ctx.fillStyle = "rgba(239, 68, 68, 0.8)";
          ctx.fillRect(canvas.width/3, canvas.height/3, canvas.width/3, canvas.height/3);
          ctx.restore();
          const base64Data = canvas.toDataURL('image/png').replace(/^data:image\/(png|jpg|jpeg);base64,/, "");
          resolve(base64Data);
        };
        
        prodImg.src = getProductImageSrc();
      };
      
      modelImg.onerror = () => {
        // Fallback if model image fails
        canvas.width = 600;
        canvas.height = 800;
        ctx.fillStyle = "#1e293b";
        ctx.fillRect(0,0,600,800);
        const base64Data = canvas.toDataURL('image/png').replace(/^data:image\/(png|jpg|jpeg);base64,/, "");
        resolve(base64Data);
      };
      
      modelImg.src = getModelImageSrc();
    });
  };

  const startAIPhotoshoot = async () => {
    setIsGenerating(true);
    setGenerationStep('가상 배치도 합성 가이드 제작 중...');
    
    try {
      // 1. Create guide image from visual workspace positioning
      const compositeBase64 = await generateCompositeBase64();
      
      setGenerationStep('촬영 파라미터 프롬프트 조립 중...');
      
      // 2. Build descriptive parameters
      const selectedAngleObj = CAMERA_ANGLES.find(a => a.id === cameraAngle);
      const selectedPoseObj = POSES.find(p => p.id === pose);
      const selectedRangeObj = SHOWING_RANGES.find(r => r.id === showingRange);
      const selectedBgObj = BACKGROUNDS.find(b => b.id === background);
      const selectedLightingObj = LIGHTINGS.find(l => l.id === lighting);
      
      // Smart ad-campaign prompt generator
      const finalPrompt = `Create a high-end commercial advertising photoshoot based on the layout reference image provided.
The product shown positioned on the model must be seamlessly and flawlessly integrated into the scene.
Adapt the product to match the lighting, realistic soft cast-shadows, matching skin/fabric folds, and camera perspective of the model's pose.

Shoot Specifications:
- Product Details: ${customPrompt || 'Premium commercial fashion product'}
- Camera Angle: ${selectedAngleObj.label}. ${selectedAngleObj.desc}
- Model Pose: ${selectedPoseObj.label}. ${selectedPoseObj.desc}
- Show Range/Framing: ${selectedRangeObj.label}. ${selectedRangeObj.desc}
- Background Location: ${selectedBgObj.label}. ${selectedBgObj.desc}
- Lighting Style: ${selectedLightingObj.label}. ${selectedLightingObj.desc}

Technical Style: Professional high-fashion advertising campaign grade, realistic textures, detailed leather/metals/fabrics, elegant rim highlights, 8k resolution, cinematic atmosphere, crisp focus on the product, natural fitment. Avoid extra duplicate floating products. Only generate one stunning final image.`;

      setGenerationStep('Gemini 3.1 Flash Image 연결 및 촬영 렌더링 중 (약 10-15초)...');
      
      // Prepare payload for Gemini 3.1 Flash Image Model
      const payload = {
        contents: [{
          role: 'user',
          parts: [
            { text: finalPrompt },
            {
              inlineData: {
                mimeType: "image/png",
                data: compositeBase64
              }
            }
          ]
        }],
        generationConfig: {
          responseModalities: ['IMAGE'],
          imageConfig: {
            aspectRatio: "3:4"
          }
        }
      };

      // Handle custom or default API key safely
      const finalApiKey = apiKey || ""; // Automatically falls back to backend environment key in Canvas if empty
      const apiUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-3.1-flash-image-preview:generateContent?key=${finalApiKey}`;
      
      const response = await fetch(apiUrl, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      
      if (!response.ok) {
        const errText = await response.text();
        throw new Error(`API 응답 오류 (${response.status}): ${errText}`);
      }

      const result = await response.json();
      const imagePart = result?.candidates?.[0]?.content?.parts?.find(p => p.inlineData);
      
      if (!imagePart || !imagePart.inlineData?.data) {
        throw new Error("결과 이미지 데이터를 반환받지 못했습니다. 요청 인자를 확인하세요.");
      }

      const renderedUrl = `data:${imagePart.inlineData.mimeType};base64,${imagePart.inlineData.data}`;
      setGeneratedImageUrl(renderedUrl);
      
      // Add to session photoshoot history
      const newHistoryItem = {
        id: 'photo-' + Date.now(),
        product: selectedProduct.name,
        model: selectedModel.name,
        timestamp: new Date().toLocaleTimeString(),
        parameters: {
          angle: selectedAngleObj.label,
          pose: selectedPoseObj.label,
          background: selectedBgObj.label,
          lighting: selectedLightingObj.label
        },
        url: renderedUrl
      };
      setGenerationHistory(prev => [newHistoryItem, ...prev]);
      setGenerationStep('완성되었습니다!');
      
    } catch (error) {
      console.error(error);
      alert(`AI 화보 촬영 중 요류 발생: ${error.message}\nAPI 키가 정확하게 등록되어 있고 유효한지 확인해주세요.`);
    } finally {
      setIsGenerating(false);
    }
  };

  const applyPresetMatch = (modelId, productId) => {
    const matchedModel = PRESET_MODELS.find(m => m.id === modelId);
    const matchedProduct = PRESET_PRODUCTS.find(p => p.id === productId);
    
    if (matchedModel) {
      setSelectedModel(matchedModel);
      setCustomModelImage(null);
    }
    if (matchedProduct) {
      setSelectedProduct(matchedProduct);
      setCustomProductImage(null);
    }

    // Set smart positions depending on selected matching preset
    if (productId === 'prod-sneakers') {

              <div className="space-y-2">
                <label className="text-xs font-semibold text-slate-300 block">보여지는 범위 (Framing)</label>
                <select 
                  value={showingRange}
                  onChange={(e) => setShowingRange(e.target.value)}
                  className="w-full bg-slate-900 border border-slate-800 text-slate-300 text-xs rounded-lg p-2 focus:outline-none focus:ring-1 focus:ring-indigo-500">
                  {SHOWING_RANGES.map(r => (
                    <option key={r.id} value={r.id}>{r.label}</option>
                  ))}
                </select>
              </div>

              {/* Background selection */}
              <div className="space-y-2">
                <label className="text-xs font-semibold text-slate-300 block">촬영 배경 (Background)</label>
                <select 
                  value={background}
                  onChange={(e) => setBackground(e.target.value)}
                  className="w-full bg-slate-900 border border-slate-800 text-slate-300 text-xs rounded-lg p-2 focus:outline-none focus:ring-1 focus:ring-indigo-500">
                  {BACKGROUNDS.map(bg => (
                    <option key={bg.id} value={bg.id}>{bg.label}</option>
                  ))}
                </select>
              </div>

              {/* Lighting selection */}
              <div className="space-y-2">
                <label className="text-xs font-semibold text-slate-300 block">조명 연출 (Commercial Lighting)</label>
                <select 
                  value={lighting}
                  onChange={(e) => setLighting(e.target.value)}
                  className="w-full bg-slate-900 border border-slate-800 text-slate-300 text-xs rounded-lg p-2 focus:outline-none focus:ring-1 focus:ring-indigo-500">
                  {LIGHTINGS.map(l => (
                    <option key={l.id} value={l.id}>{l.label}</option>
                  ))}
                </select>
              </div>
            </div>

            {/* Action Shooting Trigger */}
            <div className="mt-8 space-y-3">
              {isGenerating ? (
                <div className="bg-slate-900 border border-slate-800 rounded-xl p-4 space-y-3">
                  <div className="flex items-center space-x-3">
                    <div className="w-5 h-5 border-2 border-indigo-500 border-t-transparent rounded-full animate-spin"></div>
                    <span className="text-xs font-semibold text-indigo-400">AI 스튜디오 촬영 중...</span>
                  </div>
                  <p className="text-[11px] text-slate-400 leading-relaxed">{generationStep}</p>
                </div>
              ) : (
                <button
                  onClick={startAIPhotoshoot}
                  className="w-full bg-gradient-to-r from-blue-600 via-indigo-600 to-purple-600 hover:from-blue-500 hover:to-purple-500 text-white font-bold py-3.5 px-4 rounded-xl shadow-lg shadow-indigo-600/20 text-xs transition-all transform hover:-translate-y-0.5 active:translate-y-0 flex items-center justify-center space-x-2">
                  <i className="fa-solid fa-camera text-base"></i>
                  <span>AI 광고 화보 촬영 시작</span>
                </button>
              )}
              
              <div className="text-center">
                <span className="text-[10px] text-slate-500">
                  Gemini 3.1 Flash Image의 피팅 조화 기술이 결합됩니다
                </span>
              </div>
            </div>

          </aside>

        </div>
      )}

      {/* --- Gallery & History View --- */}
      {activeTab === 'history' && (
        <div className="flex-1 p-6 max-w-7xl mx-auto w-full space-y-6 overflow-y-auto">
          <div className="border-b border-slate-800 pb-4 flex justify-between items-center">
            <div>
              <h2 className="text-2xl font-bold">생성된 광고 화보 갤러리</h2>
              <p className="text-slate-400 text-sm mt-1">이번 세션에서 촬영된 완벽한 핏의 AI 광고 화보 히스토리입니다.</p>
            </div>
            {generationHistory.length > 0 && (
              <button 
                onClick={() => { if(confirm('모든 히스토리를 삭제하시겠습니까?')) setGenerationHistory([]) }}
                className="text-xs bg-red-950/40 hover:bg-red-900/50 text-red-400 border border-red-900/30 px-3 py-1.5 rounded-lg transition">
                전체 삭제
              </button>
            )}
          </div>

          {generationHistory.length === 0 ? (
            <div className="bg-slate-900/40 border border-slate-800 rounded-2xl p-16 text-center max-w-xl mx-auto mt-12 space-y-4">
              <div className="w-16 h-16 bg-slate-800 rounded-full flex items-center justify-center mx-auto text-slate-500">
                <i className="fa-solid fa-images text-2xl"></i>
              </div>
              <h3 className="text-lg font-bold text-slate-300">촬영된 광고 화보가 아직 없습니다</h3>
              <p className="text-xs text-slate-500">첫 화면의 촬영 컴포저에서 피팅 위치를 잡고 [AI 광고 화보 촬영 시작]을 클릭하세요!</p>
              <button 
                onClick={() => setActiveTab('composer')}
                className="bg-indigo-600 hover:bg-indigo-500 text-white text-xs px-4 py-2 rounded-lg font-semibold transition">
                화보 촬영하러 가기
              </button>
            </div>
          ) : (
            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
              {generationHistory.map((item) => (
                <div key={item.id} className="bg-slate-900 rounded-2xl overflow-hidden border border-slate-800 shadow-xl flex flex-col justify-between">
                  <div>
                    <div className="relative aspect-[3/4] bg-slate-950">
                      <img src={item.url} alt="Generated Shoot" className="w-full h-full object-cover" />
                      <div className="absolute top-3 left-3 bg-black/70 backdrop-blur-md px-2 py-1 rounded-md text-[10px] text-slate-300">
                        {item.timestamp}
                      </div>
                    </div>
                    
                    <div className="p-4 space-y-3">
                      <div className="flex justify-between items-center">
                        <span className="text-xs font-bold text-slate-200">
                          {item.product} × {item.model}
                        </span>
                      </div>
                      
                      <div className="grid grid-cols-2 gap-1.5 text-[10px] text-slate-400">
                        <div className="bg-slate-950 p-1.5 rounded">📐 {item.parameters.angle}</div>
                        <div className="bg-slate-950 p-1.5 rounded">🧍 {item.parameters.pose}</div>
                        <div className="bg-slate-950 p-1.5 rounded-b col-span-2">📍 {item.parameters.background}</div>
                      </div>
                    </div>
                  </div>

                  <div className="p-4 border-t border-slate-800/60 bg-slate-950 flex space-x-2">
                    <a 
                      href={item.url} 
                      download={`AI-Photoshoot-${item.id}.png`}
                      className="flex-1 bg-indigo-600 hover:bg-indigo-500 text-white text-xs text-center font-bold py-2 rounded-lg transition flex items-center justify-center space-x-1.5">
                      <i className="fa-solid fa-download"></i>
                      <span>다운로드</span>
                    </a>
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>
      )}

      {/* --- Guide & Documentation Tab --- */}
      {activeTab === 'docs' && (
        <div className="flex-1 p-6 max-w-4xl mx-auto w-full space-y-8 overflow-y-auto">
          <div className="border-b border-slate-800 pb-4">
            <h2 className="text-2xl font-bold">AdLens Studio 이용 가이드</h2>
            <p className="text-slate-400 text-sm mt-1">가상 피팅 기반 AI 상업 광고 촬영 화보 제작의 핵심 원리 및 설명</p>
          </div>

          <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div className="bg-slate-900 p-5 rounded-2xl border border-slate-800 space-y-3">
              <h3 className="font-bold text-indigo-400 text-sm flex items-center">
                <i className="fa-solid fa-wand-magic-sparkles mr-2"></i> 어떻게 동작하나요?
              </h3>
              <p className="text-xs text-slate-300 leading-relaxed">
                사용자가 캔버스 위에서 모델 몸의 적절한 부위(예: 발목 위의 신발, 손목 위의 시계)에 맞추어 상품을 적절한 각도로 올려두면, 그 가이드라인 레이아웃 정보를 <strong>Gemini 3.1 Flash Image</strong> 모델로 전송합니다. 
                AI는 이 합성 레이아웃 이미지를 기하학적 형태 가이드라인으로 인식한 후, 사용자가 설정한 촬영 세팅 조건(조명, 배경, 아웃포커싱, 카메라 앵글)을 반영하여 두 물체가 완전히 하나의 생생한 화보로 합쳐지도록 새롭게 그리게 됩니다.
              </p>
            </div>

            <div className="bg-slate-900 p-5 rounded-2xl border border-slate-800 space-y-3">
              <h3 className="font-bold text-emerald-400 text-sm flex items-center">
                <i className="fa-solid fa-lightbulb mr-2"></i> 더 멋진 사진을 만드는 꿀팁
              </h3>
              <ul className="text-xs text-slate-300 space-y-2 list-disc list-inside">
                <li><strong>배치 핏 맞추기</strong>: 상품 크기를 너무 크지도 작지도 않게 적절하게 맞추고, 각도를 관절 방향에 부합하게 살짝 꺾어주면 극대화된 시너지가 납니다.</li>
                <li><strong>조명 세팅</strong>: 사이버펑크나 야외 자연 환경을 선택했을 때는 &apos;네온 글로우&apos; 나 &apos;따뜻한 골든아워&apos; 조명을 맞춰보세요. 반사광 표현이 대폭 상향됩니다.</li>
                <li><strong>맞춤형 묘사 추가</strong>: 하단에 제품의 디테일(예: &apos;광택이 도는 검정 스마트워치&apos;)을 적어주면 AI가 텍스처를 기가 막히게 세공합니다.</li>
              </ul>
            </div>
          </div>

          {/* Model Tech Spec Summary */}
          <div className="bg-slate-900/40 border border-slate-800 rounded-2xl p-6 space-y-4">
            <h3 className="font-bold text-slate-200 text-sm">핵심 적용 기술 스펙트럼</h3>
            <div className="grid grid-cols-2 sm:grid-cols-4 gap-4 text-center">
              <div className="bg-slate-950 p-4 rounded-xl">
                <i className="fa-solid fa-bezier-curve text-indigo-400 text-xl mb-2"></i>
                <div className="text-xs font-bold text-slate-200">기하학적 핏팅 매칭</div>
                <div className="text-[10px] text-slate-500 mt-1">인체 구도 인식</div>
              </div>
              <div className="bg-slate-950 p-4 rounded-xl">
                <i className="fa-solid fa-lightbulb text-amber-400 text-xl mb-2"></i>
                <div className="text-xs font-bold text-slate-200">인텔리전트 그림자</div>
                <div className="text-[10px] text-slate-500 mt-1">빛과 조화로운 동기화</div>
              </div>
              <div className="bg-slate-950 p-4 rounded-xl">
                <i className="fa-solid fa-glasses text-emerald-400 text-xl mb-2"></i>
                <div className="text-xs font-bold text-slate-200">8K 디테일 업스케일</div>
                <div className="text-[10px] text-slate-500 mt-1">상품 무결점 질감 처리</div>
              </div>
              <div className="bg-slate-950 p-4 rounded-xl">
                <i className="fa-solid fa-camera text-blue-400 text-xl mb-2"></i>
                <div className="text-xs font-bold text-slate-200">스튜디오 아웃포커스</div>
                <div className="text-[10px] text-slate-500 mt-1">상업용 피사계 심도 제어</div>
              </div>
            </div>
          </div>
        </div>
      )}

      {/* --- Generation Modal Result Overlap Screen --- */}
      {generatedImageUrl && activeTab === 'composer' && (
        <div className="fixed inset-0 bg-black/95 z-50 flex flex-col justify-center items-center p-4 overflow-y-auto">
          <div className="w-full max-w-4xl bg-slate-900 border border-slate-800 rounded-2xl overflow-hidden shadow-2xl">
            
            {/* Modal Header */}
            <div className="p-4 border-b border-slate-800 bg-slate-950 flex justify-between items-center">
              <div className="flex items-center space-x-2">
                <span className="bg-emerald-500/20 text-emerald-400 px-2 py-0.5 rounded text-xs font-bold">완성</span>
                <h3 className="font-bold text-slate-200">AI 가상 광고 화보 촬영 결과</h3>
              </div>
              <button 
                onClick={() => setGeneratedImageUrl(null)}
                className="bg-slate-800 hover:bg-slate-700 text-slate-300 w-8 h-8 rounded-full flex items-center justify-center transition">
                <i className="fa-solid fa-xmark"></i>
              </button>
            </div>

            {/* Shoot Split Screen (Comparison Slider Style) */}
            <div className="grid grid-cols-1 md:grid-cols-2 gap-6 p-6">
              
              {/* Draft Fitting Input Guide */}
              <div className="space-y-2">
                <span className="text-xs text-slate-400 font-bold block text-center">
                  [이전] 원본 피팅 가이드 레이아웃
                </span>
                <div className="aspect-[3/4] bg-slate-950 rounded-xl overflow-hidden border border-slate-800 relative">
                  <img src={getModelImageSrc()} className="w-full h-full object-cover" />
                  <div 
                    style={{
                      position: 'absolute',
                      left: `${(prodPos.x / (composerContainerRef.current?.getBoundingClientRect().width || 1)) * 100}%`,
                      top: `${(prodPos.y / (composerContainerRef.current?.getBoundingClientRect().height || 1)) * 100}%`,
                      transform: `translate(-50%, -50%) rotate(${prodPos.rotation}deg) scale(${prodPos.scale * 0.95})`,
                      opacity: 0.8
                    }}
                    className="absolute w-1/2">
                    <img src={getProductImageSrc()} className="w-full drop-shadow-xl" />
                  </div>
                </div>
              </div>

              {/* Generated AI Photoshoot */}
              <div className="space-y-2">
                <span className="text-xs text-indigo-400 font-bold block text-center">
                  ✨ [AI 촬영완료] 핏 매칭 광고 화보
                </span>
                <div className="aspect-[3/4] bg-slate-950 rounded-xl overflow-hidden border border-indigo-500/30 shadow-lg shadow-indigo-600/10">
                  <img src={generatedImageUrl} className="w-full h-full object-cover" />
                </div>
              </div>

            </div>

            {/* Modal Bottom Actions */}
            <div className="p-4 bg-slate-950 border-t border-slate-800 flex justify-between items-center flex-wrap gap-2">
              <p className="text-[11px] text-slate-500 max-w-md">
                인공지능이 모델의 체형 굴곡을 분석하여 조명 매칭과 미려한 셰이딩 처리를 실시간으로 일체화시켰습니다.
              </p>
              <div className="flex space-x-2">
                <button 
                  onClick={() => setGeneratedImageUrl(null)}
                  className="bg-slate-800 hover:bg-slate-700 text-slate-200 text-xs px-4 py-2.5 rounded-lg transition font-semibold">
                  닫기 및 다시 맞추기
                </button>
                <a 
                  href={generatedImageUrl} 
                  download="AI_Premium_Photoshoot.png"
                  className="bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 text-white text-xs px-5 py-2.5 rounded-lg transition font-bold shadow flex items-center space-x-1.5">
                  <i className="fa-solid fa-download"></i>
                  <span>초고화질 화보 다운로드</span>
                </a>
              </div>
            </div>

          </div>
        </div>
      )}

      {/* --- Footer Status Bar --- */}
      <footer className="bg-[#0b0f19] border-t border-slate-900 px-6 py-3 text-center text-xs text-slate-500 flex justify-between items-center">
        <span>© 2026 AdLens AI Studio Inc. All rights reserved.</span>
        <div className="flex items-center space-x-4">
          <span className="flex items-center text-[11px]">
            <span className="w-1.5 h-1.5 rounded-full bg-emerald-500 mr-1.5"></span>
            Gemini 3.1 Flash Image 연결됨
          </span>
          <span className="text-slate-600">|</span>
          <a href="#" onClick={() => setActiveTab('docs')} className="hover:text-slate-300">이용 약관 및 개인정보 처리방침</a>
        </div>
      </footer>

    </div>
  );
}

// Render React App
const container = document.getElementById('root');
const root = ReactDOM.createRoot(container);
root.render(<App />);
</script>

</body>
</html>
