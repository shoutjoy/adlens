function App() {
  const [apiKey, setApiKey] = useState('');
  
  // Model & Product Selections

  // Custom uploaded images

  // AI Product Extraction Tool states

  const [extractionPrompt, setExtractionPrompt] = useState('네온 레드 운동화 (neon red athletic runners)');

  const [extractionStep, setExtractionStep] = useState('');
  const [productInputMode, setProductInputMode] = useState('preset'); // 'preset' or 'extractor'

  // Layout Composer State
  const [prodPos, setProdPos] = useState({ x: 50, y: 50, scale: 0.6, rotation: 0, opacity: 1 });
  const [isDragging, setIsDragging] = useState(false);
  const [dragStart, setDragStart] = useState({ x: 0, y: 0 });

  // Camera, Pose, Background, Ratio, Resolution selections
  const [cameraAngle, setCameraAngle] = useState(CAMERA_ANGLES[0].id);
  const [pose, setPose] = useState(POSES[1].id);
  const [showingRange, setShowingRange] = useState(SHOWING_RANGES[2].id);
  const [background, setBackground] = useState(BACKGROUNDS[3].id);
  const [lighting, setLighting] = useState(LIGHTINGS[2].id);
  const [aspectRatio, setAspectRatio] = useState('3:4');
  const [resolution, setResolution] = useState('2k');
  const [customPrompt, setCustomPrompt] = useState('');

  // AI Generation States
  const [isGenerating, setIsGenerating] = useState(false);
  const [generationStep, setGenerationStep] = useState('');
  const [generatedImageUrl, setGeneratedImageUrl] = useState(null);
  const [generationHistory, setGenerationHistory] = useState([]);
  
  // LLM Integrated State Features
  const [isEnhancingPrompt, setIsEnhancingPrompt] = useState(false);
  const [isGeneratingMarketing, setIsGeneratingMarketing] = useState(false);
  const [isAnalyzingScene, setIsAnalyzingScene] = useState(false);
  const [marketingCopy, setMarketingCopy] = useState(null);
  const [visualCritique, setVisualCritique] = useState(null);
  const [selectedModalTab, setSelectedModalTab] = useState('image'); // 'image', 'copywriting', 'critic'

  // Custom notification & confirmation systems
  const [toasts, setToasts] = useState([]);
  const [confirmModal, setConfirmModal] = useState({ show: false, message: '', onConfirm: null });

  // UI Tabs & Views
  const [activeTab, setActiveTab] = useState('composer'); // 'composer', 'history', 'docs'
  const [showGuide, setShowGuide] = useState(true);
  
  const composerContainerRef = useRef(null);

  const showToast = (message, type = 'info') => {
    const id = Date.now();
    setToasts(prev => [...prev, { id, message, type }]);
    setTimeout(() => {
      setToasts(prev => prev.filter(t => t.id !== id));
    }, 4000);
  };

  const triggerConfirm = (message, action) => {
    setConfirmModal({
      show: true,
      message,
      onConfirm: () => {
        action();
        setConfirmModal({ show: false, message: '', onConfirm: null });
      }
    });
  };

  // Get image source helpers
  const getProductImageSrc = () => customProductImage || selectedProduct.url;
  const getModelImageSrc = () => customModelImage || selectedModel.url;

  const handleDragStart = (e) => {
    setIsDragging(true);
    const clientX = e.clientX || (e.touches && e.touches[0].clientX);
    const clientY = e.clientY || (e.touches && e.touches[0].clientY);
    setDragStart({
      x: clientX - prodPos.x,
      y: clientY - prodPos.y
    });
  };

  const handleDragMove = (e) => {
    if (!isDragging) return;
    const clientX = e.clientX || (e.touches && e.touches[0].clientX);
    const clientY = e.clientY || (e.touches && e.touches[0].clientY);
    if (!clientX || !clientY) return;

    if (composerContainerRef.current) {
      const rect = composerContainerRef.current.getBoundingClientRect();
      let newX = clientX - dragStart.x;
      let newY = clientY - dragStart.y;
      
      newX = Math.max(-50, Math.min(rect.width + 50, newX));
      newY = Math.max(-50, Math.min(rect.height + 50, newY));

      setProdPos(prev => ({ ...prev, x: newX, y: newY }));
    }
  };

  const handleDragEnd = () => {
    setIsDragging(false);
  };

  const adjustScale = (amount) => {
    setProdPos(prev => ({
      ...prev,
      scale: Math.max(0.1, Math.min(2.0, parseFloat((prev.scale + amount).toFixed(2))))
    }));
  };

  const adjustRotation = (amount) => {
    setProdPos(prev => ({
      ...prev,
      rotation: (prev.rotation + amount) % 360
    }));
  };

  const adjustOpacity = (value) => {
    setProdPos(prev => ({
      ...prev,
      opacity: parseFloat(value)
    }));
  };

  const handleProductUpload = (e) => {
    const file = e.target.files[0];
    if (file) {
      const reader = new FileReader();
      reader.onload = (uploadEvent) => {
        setCustomProductImage(uploadEvent.target.result);
        showToast("커스텀 상품 이미지가 등록되었습니다.", "success");
      };
      reader.readAsDataURL(file);
    }
  };

  const handleModelUpload = (e) => {
    const file = e.target.files[0];
    if (file) {
      const reader = new FileReader();
      reader.onload = (uploadEvent) => {
        setCustomModelImage(uploadEvent.target.result);
        showToast("커스텀 모델 이미지가 등록되었습니다.", "success");
      };
      reader.readAsDataURL(file);
    }
  };

  const handleExtractorUpload = (e) => {
    const file = e.target.files[0];
    if (file) {
      const reader = new FileReader();
      reader.onload = (uploadEvent) => {
        setExtractorSrcImage(uploadEvent.target.result);
        showToast("상품 분석 소스 이미지가 업로드되었습니다.", "info");
      };
      reader.readAsDataURL(file);
    }
  };

  const removeGreenBackground = (imageSrc) => {
    return new Promise((resolve) => {
      const img = new Image();
      img.crossOrigin = "anonymous";
      img.onload = () => {
        const canvas = document.createElement('canvas');
        canvas.width = img.width;
        canvas.height = img.height;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0);
        
        const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const data = imgData.data;
        
        for (let i = 0; i < data.length; i += 4) {
          const r = data[i];
          const g = data[i + 1];
          const b = data[i + 2];
          
          // Chroma Key logic targeting solid vibrant green hues (#00FF00)
          const isGreen = (g > 110 && g > r * 1.25 && g > b * 1.25) || (g > 175 && r < 100 && b < 100);
          if (isGreen) {
            data[i + 3] = 0; // Set Alpha to 0 (completely transparent)
          }
        }
        
        ctx.putImageData(imgData, 0, 0);
        resolve(canvas.toDataURL('image/png'));
      };
      img.src = imageSrc;
    });
  };

  const handleProductExtraction = async () => {
    if (!extractorSrcImage) {
      showToast("먼저 상품이 포함된 소스 이미지를 업로드해주세요.", "warning");
      return;
    }
    if (!extractionPrompt.trim()) {
      showToast("추출할 상품명 및 상세 묘사(프롬프트)를 적어주세요.", "warning");
      return;
    }
    
    setIsExtracting(true);
    setExtractionStep('이미지 데이터 업로드 분석 중...');
    
    try {
      const cleanSourceBase64 = extractorSrcImage.replace(/^data:image\/(png|jpg|jpeg);base64,/, "");
      
      setExtractionStep('Gemini 3.1 Flash Image 크로마키 격리 연산 중...');
      
      const isolatePrompt = `Extract and isolate only the specified product: "${extractionPrompt}".
Place this item exactly as it is, but on a solid, uniform, vibrant neon green background (hex color #00FF00).
All other elements, including people, hands, holding gestures, original background, clothing, and other objects must be completely erased and replaced with the solid vibrant neon green (#00FF00) background. Do not add cast-shadows outside the object. Keep only the requested item completely intact with its high-detail natural texture.`;

      const payload = {
        contents: [{
          role: 'user',
          parts: [
            { text: isolatePrompt },
            {
              inlineData: {
                mimeType: "image/png",
                data: cleanSourceBase64
              }
            }
          ]
        }],
        generationConfig: {
          responseModalities: ['IMAGE'],
          imageConfig: {
            aspectRatio: "1:1" // Perfect square ratio for stickers
          }
        }
      };

      const finalApiKey = apiKey || ""; 
      const apiUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-3.1-flash-image-preview:generateContent?key=${finalApiKey}`;
      
      const response = await fetch(apiUrl, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      
      if (!response.ok) {
        const errText = await response.text();
        throw new Error(`격리 API 오류: ${errText}`);
      }

      const result = await response.json();
      const imagePart = result?.candidates?.[0]?.content?.parts?.find(p => p.inlineData);
      
      if (!imagePart || !imagePart.inlineData?.data) {
        throw new Error("결과 상품 격리 이미지를 받아오지 못했습니다.");
      }

      setExtractionStep('그린 스크린 투명도(크로마키 Alpha) 필터 처리 중...');
      const greenScreenUrl = `data:${imagePart.inlineData.mimeType};base64,${imagePart.inlineData.data}`;
      
      const transparentPngUrl = await removeGreenBackground(greenScreenUrl);
      
      setCustomProductImage(transparentPngUrl);
      setExtractionStep('추출 완료!');

  const generateCompositeBase64 = async () => {
    return new Promise((resolve) => {
      const canvas = document.createElement('canvas');
      const ctx = canvas.getContext('2d');
      
      const modelImg = new Image();
      const prodImg = new Image();
      
      modelImg.crossOrigin = "anonymous";
      prodImg.crossOrigin = "anonymous";
      
      modelImg.onload = () => {
        canvas.width = modelImg.naturalWidth || 800;
        canvas.height = modelImg.naturalHeight || 1000;
        
        ctx.drawImage(modelImg, 0, 0, canvas.width, canvas.height);
        
        prodImg.onload = () => {
          if (composerContainerRef.current) {
            const rect = composerContainerRef.current.getBoundingClientRect();
            
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            
            const targetX = prodPos.x * scaleX;
            const targetY = prodPos.y * scaleY;
            
            const targetWidth = (rect.width * prodPos.scale) * scaleX;
            const targetHeight = (prodImg.naturalHeight * (targetWidth / prodImg.naturalWidth));
            
            ctx.save();
            ctx.globalAlpha = prodPos.opacity;
            
            ctx.translate(targetX, targetY);
            ctx.rotate((prodPos.rotation * Math.PI) / 180);
            
            ctx.drawImage(prodImg, -targetWidth / 2, -targetHeight / 2, targetWidth, targetHeight);
            ctx.restore();
          }
          
          const dataURL = canvas.toDataURL('image/png');
          const base64Data = dataURL.replace(/^data:image\/(png|jpg|jpeg);base64,/, "");
          resolve(base64Data);
        };
        
        prodImg.onerror = () => {
          ctx.save();
          ctx.fillStyle = "rgba(239, 68, 68, 0.8)";
          ctx.fillRect(canvas.width/3, canvas.height/3, canvas.width/3, canvas.height/3);
          ctx.restore();
          const base64Data = canvas.toDataURL('image/png').replace(/^data:image\/(png|jpg|jpeg);base64,/, "");
          resolve(base64Data);
        };
        
        prodImg.src = getProductImageSrc();
      };
      
      modelImg.onerror = () => {
        canvas.width = 600;
        canvas.height = 800;
        ctx.fillStyle = "#1e293b";
        ctx.fillRect(0,0,600,800);
        const base64Data = canvas.toDataURL('image/png').replace(/^data:image\/(png|jpg|jpeg);base64,/, "");
        resolve(base64Data);
      };
      
      modelImg.src = getModelImageSrc();
    });

                          </button>

                        <div className="bg-slate-900 border border-slate-800 p-3 rounded-lg">
                          <h4 className="text-xs text-slate-400 font-semibold mb-1">SNS 인스타그램 마케팅 포스트</h4>
                          <p className="text-xs text-slate-300 leading-relaxed whitespace-pre-line">{marketingCopy.instagram}</p>
                          <button 
                            onClick={() => copyToClipboard(marketingCopy.instagram)}
                            className="mt-2 text-[10px] text-indigo-400 hover:underline flex items-center">
                            <i className="fa-solid fa-copy mr-1"></i> 포스트 복사
                          </button>
                        </div>

                        <div className="bg-slate-900 border border-slate-800 p-3 rounded-lg">
                          <h4 className="text-xs text-slate-400 font-semibold mb-1">💡 추천 마케팅 타겟팅 및 비전</h4>
                          <p className="text-xs text-slate-300 leading-relaxed">{marketingCopy.strategy}</p>
                        </div>
                      </div>
                    ) : (
                      <div className="text-center py-12 text-slate-500">
                        카피라이팅을 생성하지 못했습니다.
                      </div>
                    )}
                  </div>
                )}

                {/* TAB 3: Visual Critic */}
                {selectedModalTab === 'critic' && (
                  <div className="bg-slate-950 p-5 rounded-xl border border-slate-800 h-[350px] overflow-y-auto flex flex-col justify-between">
                    <div className="space-y-4 flex-1">
                      {isAnalyzingScene ? (
                        <div className="flex flex-col items-center justify-center h-full space-y-3 pt-12">
                          <div className="w-8 h-8 border-4 border-indigo-500 border-t-transparent rounded-full animate-spin"></div>
                          <p className="text-xs text-slate-400">Gemini 멀티모달 기술자가 피팅 및 그림자 정합성을 감정 중...</p>
                        </div>
                      ) : visualCritique ? (
                        <div className="space-y-4">
                          <div className="border-l-4 border-emerald-500 pl-3 flex justify-between items-center">
                            <h4 className="text-xs font-bold text-slate-400">AI 비평가 종합 감정 및 컨설팅 리포트</h4>
                          </div>
                          <p className="text-xs text-slate-300 leading-relaxed whitespace-pre-line">{visualCritique}</p>
                        </div>
                      ) : (
                        <div className="text-center py-12 text-slate-500">
                          피드백 데이터가 없습니다.
                        </div>
                      )}
                    </div>

                    {visualCritique && !isAnalyzingScene && (
                      <div className="mt-4 pt-4 border-t border-slate-800 flex space-x-2 justify-end">
                        <button
                          onClick={handleCopyMarkdown}
                          className="bg-indigo-600/20 text-indigo-400 border border-indigo-500/30 hover:bg-indigo-600 hover:text-white px-3 py-1.5 rounded-lg text-xs font-bold transition flex items-center space-x-1.5">
                          <i className="fa-solid fa-code"></i>
                          <span>마크다운 형식 복사</span>
                        </button>
                        <button
                          onClick={handleCopyFormattedText}
                          className="bg-emerald-600/20 text-emerald-400 border border-emerald-500/30 hover:bg-emerald-600 hover:text-white px-3 py-1.5 rounded-lg text-xs font-bold transition flex items-center space-x-1.5">
                          <i className="fa-solid fa-align-left"></i>
                          <span>일반 텍스트 서식 복사</span>
                        </button>
                      </div>
                    )}
                  </div>
                )}

              </div>

              {/* Right Column: Original Scene Setup Metadata & AI Direction details */}
              <div className="lg:col-span-6 flex flex-col justify-between space-y-4">
                <div className="space-y-4">
                  <div className="bg-slate-950 p-4 rounded-xl border border-slate-800">
                    <h4 className="text-xs font-bold text-slate-300 mb-2 flex items-center">
                      <i className="fa-solid fa-sliders text-indigo-500 mr-2"></i>조율된 촬영 연출 메타데이터
                    </h4>
                    <div className="grid grid-cols-2 gap-2 text-xs text-slate-400">
                      <div className="bg-slate-900/50 p-2.5 rounded border border-slate-800">
                        <span className="text-[10px] text-slate-500 block mb-0.5">선택 상품</span>
                        <span className="font-semibold text-slate-200 truncate block">
                          {customProductImage ? '사용자 등록 상품' : selectedProduct.name}
                        </span>
                      </div>
                      <div className="bg-slate-900/50 p-2.5 rounded border border-slate-800">
                        <span className="text-[10px] text-slate-500 block mb-0.5">매칭 모델</span>
                        <span className="font-semibold text-slate-200 truncate block">
                          {customModelImage ? '사용자 등록 모델' : selectedModel.name}
                        </span>
                      </div>
                      <div className="bg-slate-900/50 p-2.5 rounded border border-slate-800">
                        <span className="text-[10px] text-slate-500 block mb-0.5">카메라 앵글</span>
                        <span className="font-semibold text-slate-200 block">
                          {CAMERA_ANGLES.find(a => a.id === cameraAngle)?.label}
                        </span>
                      </div>
                      <div className="bg-slate-900/50 p-2.5 rounded border border-slate-800">
                        <span className="text-[10px] text-slate-500 block mb-0.5">선택 조명</span>
                        <span className="font-semibold text-slate-200 block">
                          {LIGHTINGS.find(l => l.id === lighting)?.label}
                        </span>
                      </div>
                      <div className="bg-slate-900/50 p-2.5 rounded border border-slate-800 col-span-2">
                        <span className="text-[10px] text-slate-500 block mb-0.5">출력 규격 및 화질 비율</span>
                        <span className="font-bold text-indigo-400 block">
                          {aspectRatio} Ratio | {RESOLUTIONS.find(r => r.id === resolution)?.label}
                        </span>
                      </div>
                    </div>
                  </div>

                  <div className="bg-indigo-950/20 border border-indigo-900/40 p-4 rounded-xl space-y-2">
                    <span className="text-xs font-bold text-indigo-400 flex items-center">
                      <i className="fa-solid fa-wand-magic-sparkles mr-2 animate-bounce"></i>
                      AI 렌더링 세부 묘사 프롬프트
                    </span>
                    <p className="text-[11px] text-slate-300 leading-relaxed italic select-all cursor-pointer" title="클릭하여 복사">
                      {customPrompt || '기본 연출 최적화 상태'}
                    </p>
                  </div>
                </div>

                {/* Modal Footer actions */}
                <div className="pt-4 border-t border-slate-800 flex justify-end space-x-2">
                  <button 
                    onClick={() => setGeneratedImageUrl(null)}
                    className="bg-slate-800 hover:bg-slate-700 text-slate-200 text-xs px-4 py-2.5 rounded-lg transition font-semibold">
                    닫기 및 피팅 재설정
                  </button>
                  <a 
                    href={generatedImageUrl} 
                    download="Premium_AdLens_Shoot.png"
                    className="bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 text-white text-xs px-5 py-2.5 rounded-lg transition font-bold shadow-lg flex items-center space-x-1.5">
                    <i className="fa-solid fa-download"></i>
                    <span>초고화질 광고 화보 다운로드</span>
                  </a>
                </div>

              </div>

            </div>

          </div>
        </div>
      )}

      {/* --- Footer Status Bar --- */}
      <footer className="bg-[#0b0f19] border-t border-slate-900 px-6 py-3 text-center text-xs text-slate-500 flex justify-between items-center mt-auto">
        <span>© 2026 AdLens AI Studio Inc. Powered by Gemini Pro & Live Image APIs.</span>
        <div className="flex items-center space-x-4">
          <span className="flex items-center text-[10px]">
            <span className="w-1.5 h-1.5 rounded-full bg-emerald-500 mr-1.5 animate-pulse"></span>
            Gemini Multimodal / Text LLM 연동 상태
          </span>
          <span className="text-slate-600">|</span>
          <a href="#" onClick={() => setActiveTab('docs')} className="hover:text-slate-300">사용자 이용 약관</a>
        </div>
      </footer>

    </div>
  );
}

// Render React App
const container = document.getElementById('root');
const root = ReactDOM.createRoot(container);
root.render(<App />);
</script>

</body>
</html>
